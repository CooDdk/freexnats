name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: freexnats-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset_name: freexnats-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: freexnats-darwin-arm64
          - goos: linux
            goarch: amd64
            asset_name: freexnats-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: freexnats-linux-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release asset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "dist/${ASSET_NAME}" .

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: freexnats ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}.
          files: dist/*
          fail_on_unmatched_files: true
